<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Console — Mini Cloud</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 44px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      flex-shrink: 0;
    }

    .toolbar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #60a5fa;
      font-weight: 600;
      font-size: 13px;
    }

    .vm-name {
      font-weight: 600;
      color: #f9fafb;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280; /* grey = connecting */
      flex-shrink: 0;
    }
    .status-dot.connected    { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }

    .status-text {
      color: #9ca3af;
      font-size: 12px;
    }

    .toolbar-spacer { flex: 1; }

    .toolbar-btn {
      padding: 4px 12px;
      border-radius: 5px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #e5e7eb;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toolbar-btn:hover { background: #374151; }
    .toolbar-btn.danger {
      border-color: #7f1d1d;
      background: #1c1917;
      color: #fca5a5;
    }
    .toolbar-btn.danger:hover { background: #450a0a; }

    /* ── VNC canvas area ── */
    #vnc-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #000;
    }

    /* noVNC injects its canvas here — make it fill the container */
    #vnc-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Overlay shown while connecting ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0,0,0,0.85);
      z-index: 10;
    }
    #overlay.hidden { display: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #374151;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .overlay-msg {
      color: #9ca3af;
      font-size: 14px;
    }

    .overlay-error {
      color: #fca5a5;
      font-size: 14px;
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }

    .retry-btn {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .retry-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <div class="toolbar-logo">
      <svg width="18" height="18" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#2563eb"/>
        <path d="M10 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="20" cy="16" r="3" fill="#fff"/>
      </svg>
      MiniCloud
    </div>

    <span style="color:#4b5563;">›</span>
    <span class="vm-name" id="vm-name-label">Loading…</span>

    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Connecting…</span>

    <div class="toolbar-spacer"></div>

    <button class="toolbar-btn" onclick="sendCtrlAltDel()" title="Send Ctrl+Alt+Del to the VM">
      Ctrl+Alt+Del
    </button>
    <button class="toolbar-btn danger" onclick="disconnect()">
      Disconnect
    </button>
  </div>

  <!-- ── VNC canvas ── -->
  <div id="vnc-container">
    <div id="overlay">
      <div class="spinner"></div>
      <div class="overlay-msg" id="overlay-msg">Requesting console access…</div>
    </div>
  </div>

  <!--
    noVNC core/rfb.js is the main module that handles the RFB (VNC) protocol.
    It must be loaded as an ES module — noVNC uses ES module imports internally.
    The path points to the static files served by Flask.
  -->
  <script type="module">
    import RFB from '/static/novnc/core/rfb.js';

    const INSTANCE_ID = {{ instance_id | tojson }};
    const token       = localStorage.getItem('mc_token');

    const overlay    = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlay-msg');
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const vmLabel    = document.getElementById('vm-name-label');

    let rfb = null;

    function setStatus(state, msg) {
      statusText.textContent = msg;
      statusDot.className    = 'status-dot ' + state;  // 'connected' | 'disconnected' | ''
    }

    function showOverlay(html, showSpinner = true) {
      overlay.classList.remove('hidden');
      overlayMsg.innerHTML = '';
      if (showSpinner) {
        const sp = document.createElement('div');
        sp.className = 'spinner';
        overlay.prepend(sp);
      } else {
        const existing = overlay.querySelector('.spinner');
        if (existing) existing.remove();
      }
      overlayMsg.innerHTML = html;
    }

    function hideOverlay() {
      overlay.classList.add('hidden');
    }

    async function startConsole() {
      if (!token) {
        showOverlay('<div class="overlay-error">Not logged in. Please <a href="/" style="color:#60a5fa;">log in</a> first.</div>', false);
        return;
      }

      // Step 1: Ask the API to start websockify and return the ws:// URL.
      // Auth is required — a rogue page cannot open consoles for other users' VMs.
      let wsUrl, instName;
      try {
        const resp = await fetch(`/api/v1/instances/${INSTANCE_ID}/console`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const body = await resp.json();
        if (!resp.ok) {
          showOverlay(`<div class="overlay-error">${body.message || 'Console unavailable.'}</div>
                       <button class="retry-btn" onclick="location.reload()">Retry</button>`, false);
          return;
        }
        wsUrl    = body.websocket_url;
        instName = body.instance_name;
      } catch (err) {
        showOverlay(`<div class="overlay-error">Network error: ${err.message}</div>
                     <button class="retry-btn" onclick="location.reload()">Retry</button>`, false);
        return;
      }

      vmLabel.textContent = instName || INSTANCE_ID;
      setStatus('', 'Connecting…');

      // Step 2: Connect noVNC to the websockify WebSocket URL.
      // RFB = Remote Framebuffer — the protocol VNC is built on.
      rfb = new RFB(document.getElementById('vnc-container'), wsUrl);

      // Scale the VM screen to fit the browser window instead of scrolling
      rfb.scaleViewport = true;
      rfb.resizeSession = false;

      rfb.addEventListener('connect', () => {
        setStatus('connected', 'Connected');
        hideOverlay();
      });

      rfb.addEventListener('disconnect', (e) => {
        setStatus('disconnected', 'Disconnected');
        const reason = e.detail?.clean ? 'Session ended cleanly.' : 'Connection lost. The VM may have stopped.';
        showOverlay(`<div class="overlay-error">${reason}</div>
                     <button class="retry-btn" onclick="location.reload()">Reconnect</button>`, false);
        rfb = null;
      });

      rfb.addEventListener('credentialsrequired', () => {
        // Most libvirt VNC sessions have no password — if one is set, prompt here
        rfb.sendCredentials({ password: '' });
      });
    }

    function sendCtrlAltDel() {
      // Useful when the VM is at a login screen or hung process
      if (rfb) rfb.sendCtrlAltDel();
    }

    function disconnect() {
      if (rfb) {
        rfb.disconnect();
      } else {
        window.close();
      }
    }

    // Expose for toolbar buttons (they are outside the module scope)
    window.sendCtrlAltDel = sendCtrlAltDel;
    window.disconnect     = disconnect;

    startConsole();
  </script>
</body>
</html>
