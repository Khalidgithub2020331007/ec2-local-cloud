{% extends "base.html" %}
{% block title %}Login — Mini Cloud{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#2563eb"/>
        <path d="M10 26c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="20" cy="16" r="3" fill="#fff"/>
      </svg>
      <span class="auth-logo-text">MiniCloud</span>
    </div>

    <h1 class="auth-title">Sign in to your account</h1>
    <p class="auth-subtitle">Enter your credentials to access the cloud console</p>

    <div id="error-msg" class="alert alert-error" style="display:none;"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your-username" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span id="btn-text">Sign In</span>
        <span id="btn-spinner" class="spinner" style="display:none;"></span>
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn    = document.getElementById('login-btn');
    const text   = document.getElementById('btn-text');
    const spinner = document.getElementById('btn-spinner');
    const errorDiv = document.getElementById('error-msg');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showError(errorDiv, 'Please enter username and password.');
      return;
    }

    // Loading state দেখাও
    btn.disabled = true; text.style.display = 'none'; spinner.style.display = 'inline-block';
    errorDiv.style.display = 'none';

    try {
      const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (res.ok) {
        // JWT token localStorage এ রাখা হচ্ছে — dashboard এ ব্যবহার হবে
        localStorage.setItem('mc_token', data.token);
        localStorage.setItem('mc_user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } else {
        showError(errorDiv, data.message || 'Login failed.');
      }
    } catch (_) {
      showError(errorDiv, 'Cannot connect to server. Is it running?');
    } finally {
      btn.disabled = false; text.style.display = 'inline'; spinner.style.display = 'none';
    }
  });
</script>
{% endblock %}
