[[local|localrc]]

# ============================================================
# MACHINE: Acer TravelMate P215-53
# OS: Ubuntu 24.04 LTS (Noble)
# IP: 10.200.194.146 (WiFi - wlp0s20f3)
# RAM: 8GB | Storage: 526GB | CPU: 16 cores (VMX enabled)
# DevStack Branch: stable/2025.1 (Epoxy)
# ============================================================

# ------------------------------------------------------------
# PASSWORDS
# ------------------------------------------------------------
ADMIN_PASSWORD=Admin1234OpenStack
DATABASE_PASSWORD=$ADMIN_PASSWORD
RABBIT_PASSWORD=$ADMIN_PASSWORD
SERVICE_PASSWORD=$ADMIN_PASSWORD

# ------------------------------------------------------------
# HOST IDENTITY
# WiFi interface - verified from `ip addr show`
# ------------------------------------------------------------
HOST_IP=10.200.195.97

# ------------------------------------------------------------
# CORE SERVICES - EC2 Feature Set
# ------------------------------------------------------------

# Keystone: Identity/Auth (IAM equivalent)
ENABLED_SERVICES=key

# Database and Message Queue
ENABLED_SERVICES+=,mysql,rabbit

# Nova: Compute (EC2 Instances)
ENABLED_SERVICES+=,n-api,n-crt,n-cpu,n-cond,n-sch,n-novnc,n-api-meta

# Placement: Resource tracking (required by Nova since Queens)
ENABLED_SERVICES+=,placement-api,placement-client

# Glance: VM Images (AMI equivalent)
ENABLED_SERVICES+=,g-api,g-reg

# Cinder: Block Storage (EBS equivalent)
ENABLED_SERVICES+=,c-sch,c-api,c-vol

# Neutron: Networking (VPC + Security Groups + Floating IPs)
# OVN handles routing/DHCP internally — no separate q-agt,q-dhcp,q-l3 agents needed
ENABLED_SERVICES+=,neutron,q-svc,q-meta

# Horizon: Web Dashboard (AWS Console equivalent)
# Disabled: system django-admin on Ubuntu 24.04 can't find openstack_dashboard in DevStack venv
# ENABLED_SERVICES+=,horizon

# ------------------------------------------------------------
# DISABLE HEAVY SERVICES (required for 8GB RAM)
# ------------------------------------------------------------

# Swift (S3 / Object Storage) - ~1GB RAM savings
disable_service s-proxy s-object s-container s-account

# Heat (CloudFormation orchestration) - RAM savings
disable_service heat h-api h-api-cfn h-api-cw h-eng

# Ceilometer (CloudWatch / Monitoring) - RAM savings
disable_service ceilometer-acompute ceilometer-acentral ceilometer-anotification ceilometer-collector

# Tempest (automated test suite) - not needed for project demo
disable_service tempest

# ------------------------------------------------------------
# NETWORKING - WiFi-compatible OVN configuration
# FLAT_INTERFACE = your WiFi NIC (verified: wlp0s20f3)
# OVN is the only supported backend in DevStack 2025.1
# ------------------------------------------------------------
FLAT_INTERFACE=wlp0s20f3
PUBLIC_INTERFACE=wlp0s20f3

# OVN uses geneve encapsulation instead of vxlan
Q_ML2_TENANT_NETWORK_TYPE=geneve

# Floating IP range - a small block from your WiFi subnet
# Your subnet is 10.200.192.0/22 (range: 10.200.192.1 - 10.200.195.254)
# Using a high range unlikely to be assigned by DHCP:
FLOATING_RANGE="10.200.195.128/26"
Q_FLOATING_ALLOCATION_POOL=start=10.200.195.130,end=10.200.195.190
PUBLIC_NETWORK_GATEWAY=10.200.192.1

# Internal/private VM network (completely isolated, no conflicts)
FIXED_RANGE="192.168.50.0/24"
FIXED_NETWORK_SIZE=256
NETWORK_GATEWAY=192.168.50.1
# Pool must contain FIXED_RANGE — default 10.0.0.0/22 doesn't include 192.168.50.x
SUBNETPOOL_PREFIX_V4=192.168.50.0/24
SUBNETPOOL_SIZE_V4=24

# Security groups enabled
Q_USE_SECGROUP=True

# ------------------------------------------------------------
# VM IMAGES - Downloaded during setup
# CirrOS = tiny 15MB Linux image for testing (fastest to boot)
# ------------------------------------------------------------
IMAGE_URLS="http://download.cirros-cloud.net/0.6.2/cirros-0.6.2-x86_64-disk.img"

# Uncomment to also get Ubuntu 22.04 minimal cloud image (~600MB):
# IMAGE_URLS+=" https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"

# ------------------------------------------------------------
# NOVA COMPUTE TUNING (for 8GB RAM)
# ------------------------------------------------------------
# Allow CPU overcommit (more VMs than physical cores)
NOVA_VCPU_PIN_SET=""

# Use qemu if kvm has any issue (slower but always works)
# Uncomment only if VMs fail to start:
# LIBVIRT_TYPE=qemu

# ------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------
LOGFILE=$DEST/logs/stack.sh.log
LOGDAYS=2
LOG_COLOR=True
VERBOSE=True
